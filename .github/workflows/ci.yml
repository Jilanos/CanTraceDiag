name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[api,dev]"
      - name: Install Playwright Chromium
        # E2E viewport/accessibility tests must run in CI; with CI=true the
        # suite fails (not skips) if the browser cannot launch (AC14).
        run: python -m playwright install --with-deps chromium
      - name: Packaging smoke test
        run: |
          python -c "import cantracediag; print(cantracediag.__version__)"
          cantracediag --help
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
        env:
          CI: "true"
